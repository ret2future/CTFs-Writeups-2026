<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        # Default IndexIgnore hides dot-prefixed names (e.g. .test); reset so the
        # whole tree—including .test—is listable and directly fetchable.
        IndexIgnoreReset ON
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>